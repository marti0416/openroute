<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con l'IA</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 100%;
            max-width: 800px;
            max-height: 90%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #image-preview {
            width: 250px;
            max-width: 100%;
            margin: 0 auto 10px auto;
            border-bottom: 1px solid #ddd;
        }
        #image-preview img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        #chat-box {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 12px 14px;
            border-radius: 12px;
            max-width: 90%;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
        }
        .user-message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .bot-message {
            background-color: #e9ecef;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        #input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #fafafa;
        }
        #file_input {
            flex: 0 0 auto;
            width: 220px;
            max-width: 220px;
            min-width: 150px;
        }
        #file_input::-webkit-file-upload-button {
            padding: 8px 10px;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        #send-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        #send-btn:hover {
            background-color: #0056b3;
        }
        /* Stili per il contenuto Markdown dentro i messaggi */
        .message p {
            margin: 0 0 10px 0;
        }
        .message p:last-child {
            margin: 0;
        }
        .message pre {
            background-color: #2b2b2b;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85rem;
            margin: 10px 0;
        }
        .message code {
            background-color: rgba(0, 0, 0, 0.08);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }
        .bot-message pre code {
            background-color: transparent; /* Il codice nei blocchi pre non ha bisogno di sfondo */
            padding: 0;
            color: inherit;
        }
        .message ul, .message ol {
            margin: 0 0 10px 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="image-preview" style="display:none;">
            <img src="#" alt="Anteprima" />
        </div>
        <div id="chat-box">
            </div>
        <div id="input-area">
            <input type="file" id="file_input" accept=".jpeg, .png, .jpg" />
            <button id="send-btn" onclick="sendFile()">Analizza</button>
        </div>
    </div>

<script>
        // CONFIGURAZIONE
        const API_KEY = "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"; // Metti la tua chiave qui
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const MODEL = "google/gemini-2.5-flash-image"; // Modello che supporta la visione
        const API_SUPABASE_KEY = "sb_publishable_DpVfV5WBU6nXhUPeSJyuaA_lS_LrbTw";
        const API_SUPABASE_URL = "https://gafvdkmztzlltlvsifra.supabase.co";
        
        // Create a single Supabase client for interacting with your database
        supabase = supabase.createClient(API_SUPABASE_URL, API_SUPABASE_KEY);
        const STORAGE_BUCKET = 'images'; // Cambia con il nome reale del tuo bucket

        // Mantieni uno storico della conversazione (fondamentale affinché l'IA ricordi il contesto)
        let conversationHistory = [
            { role: "system", content: "Sei un assistente di analisi di immagini in italiano." }
        ];

        // Funzione per inviare il messaggio con il tasto Invio
        const fileInput = document.getElementById("file_input");
        const previewDiv = document.getElementById("image-preview");
        const previewImg = previewDiv.querySelector("img");
        const sendBtn = document.getElementById("send-btn");

        fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewDiv.style.display = 'block';
            }
            reader.readAsDataURL(file);
        } else {
            previewDiv.style.display = 'none';
        }
    });

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendFile();
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }
        // Funzione principale
        async function sendFile() {
            const file = fileInput.files[0];

            if (!file) {
                alert("Per favore, seleziona un'immagine.");
                return;
            }

            console.log("[LOG ANALISI] Inizio analisi immagine");
            console.log("[LOG ANALISI] File selezionato:", {
                name: file.name,
                size: `${(file.size / 1024).toFixed(2)} KB`,
                type: file.type,
                lastModified: new Date(file.lastModified).toISOString()
            });

            sendBtn.disabled = true;
            let loadingId = null;

            addMessageToChat("Analizza l'immagine e descrivila in modo dettagliato.", "user-message");
            
            const filePath = `uploads/${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from(STORAGE_BUCKET)
                .upload(filePath, file, {
                    cacheControl: '3600',
                    upsert: false
                });

            if (uploadError) {
                console.error("[LOG SUPABASE] Upload fallito", uploadError);
                throw new Error("Upload immagine fallito: " + uploadError.message);
            }

            const { data: publicUrlData, error: publicUrlError } = await supabase.storage
                .from(STORAGE_BUCKET)
                .getPublicUrl(filePath);

            if (publicUrlError) {
                console.error("[LOG SUPABASE] Creazione public URL fallita", publicUrlError);
                throw new Error("Creazione URL immagine fallita: " + publicUrlError.message);
            }

            const url = publicUrlData.publicUrl;

            // Opzionale: salva i metadati su una tabella PostgreSQL in Supabase
            const { error: dbError } = await supabase.from('image_url').insert([
                { file_name: file.name, storage_path: filePath, url }
            ]);
            if (dbError) {
                console.warn("[LOG SUPABASE] Impossibile salvare metadati immagine:", dbError.message);
            }

            try {
                console.log("[LOG ANALISI] Conversione immagine in base64...");
                const base64Image = await fileToBase64(file);
                console.log("[LOG ANALISI] Conversione completata. Lunghezza base64:", base64Image.length);

                const userPrompt = "Analizza l'immagine e descrivila in modo dettagliato.";
                console.log("[LOG ANALISI] Prompt inviato all'IA:", userPrompt);

                conversationHistory.push({ 
                    role: "user", 
                    content: [
                        {
                            type: "text",
                            text: userPrompt
                        },
                        {
                            type: "image_url",
                            image_url: {
                                url: `${url}`,
                            }
                        }
                    ]
                });

                // Mostra un messaggio di attesa (opzionale ma consigliato)
                loadingId = addMessageToChat("Sto scrivendo...", "bot-message");

                console.log("[LOG ANALISI] Invio richiesta all'API OpenRouter...");
                console.log("[LOG ANALISI] Modello utilizzato:", MODEL);
                const requestStartTime = Date.now();

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "Analisi Immagine" 
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: conversationHistory,
                        max_tokens: 2000,
                        temperature: 0.7
                    })
                });

                console.log("[LOG ANALISI] Richiesta inviata. Tempo di attesa risposta...");

                if (!response.ok) {
                    let errorMessage = `Errore sconosciuto (${response.status}).`;
                    
                    switch (response.status) {
                        case 400:
                            errorMessage = "Errore 400: Richiesta non valida. C'è un problema nel formato del messaggio inviato.";
                            break;
                        case 401:
                            errorMessage = "Errore 401: Non autorizzato. La tua chiave API potrebbe essere non valida o scaduta.";
                            break;
                        case 402:
                            errorMessage = "Errore 402: Credito esaurito. Devi ricaricare il tuo saldo su OpenRouter.";
                            break;
                        case 403:
                            errorMessage = "Errore 403: Accesso negato. Potresti non avere i permessi necessari per utilizzare questo modello.";
                            break;
                        case 408:
                            errorMessage = "Errore 408: Timeout. Il server ha impiegato troppo tempo a rispondere, prova a inviare di nuovo.";
                            break;
                        case 429:
                            errorMessage = "Errore 429: Troppe richieste. Stai inviando messaggi troppo in fretta, aspetta un momento.";
                            break;
                    }
                    
                    if (response.status >= 500) {
                        errorMessage = `Errore ${response.status}: I server dell'intelligenza artificiale hanno un problema momentaneo.`;
                    }

                    // 📝 LOG PER LO SVILUPPATORE: Scrive l'errore API specifico nella console
                    console.error(`[LOG ERRORE API] Status: ${response.status} - ${response.statusText}`);

                    // Lanciamo l'errore per l'utente
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                const requestEndTime = Date.now();
                console.log(`[LOG ANALISI] Risposta ricevuta in ${(requestEndTime - requestStartTime)}ms`);
                console.log("[LOG ANALISI] Struttura risposta API:", Object.keys(data));
                console.log("[LOG ANALISI] API Response completo:", data);
                console.log("[LOG ANALISI] Choices:", data.choices);
                if (data.choices && data.choices.length > 0) {
                    console.log("[LOG ANALISI] Prima scelta:", data.choices[0]);
                    console.log("[LOG ANALISI] Messaggio:", data.choices[0].message);
                    console.log("[LOG ANALISI] Contenuto:", data.choices[0].message?.content);
                }
                const botReply = data.choices?.[0]?.message?.content;

                if (!botReply) {
                    console.error("[LOG ANALISI] ERRORE: Risposta IA vuota o invalida");
                    console.error("[LOG ANALISI] Controllo struttura risposta:", {
                        hasChoices: !!data.choices,
                        choicesLength: data.choices?.length,
                        hasFirstChoice: !!data.choices?.[0],
                        hasMessage: !!data.choices?.[0]?.message,
                        contentType: typeof data.choices?.[0]?.message?.content,
                        contentValue: data.choices?.[0]?.message?.content
                    });
                    throw new Error("Risposta vuota o invalida dall'API");
                }

                console.log("[LOG ANALISI] Contenuto risposta IA ricevuto:", botReply.substring(0, 200) + (botReply.length > 200 ? "..." : ""));

                document.getElementById(loadingId).remove();

                console.log("[LOG ANALISI] Elaborazione risposta per display...");
                const rawHTML = typeof marked !== 'undefined' && botReply ? marked.parse(botReply) : botReply;
        
                // 2. Puliamo l'HTML con DOMPurify per bloccare eventuali script malevoli
                const safeHTML = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(rawHTML) : rawHTML;

                console.log("[LOG ANALISI] HTML elaborato, aggiunta alla chat...");
                // 3. Mostriamo la risposta dicendo alla funzione che è HTML (true)
                addMessageToChat(safeHTML, "bot-message", true);
                conversationHistory.push({ role: "assistant", content: botReply });

                // LOG DI SUCCESSO: Utile per verificare che l'IA abbia risposto correttamente
                console.log("[LOG ANALISI] ✅ Analisi completata con successo!");
                console.log("[LOG INFO] Risposta ricevuta con successo dall'API.", botReply);
                }

                catch (error) {
                console.error("[LOG ANALISI] ❌ ERRORE durante l'analisi dell'immagine");
                // LOG GLOBALE: Cattura e stampa i dettagli tecnici completi nella console
                console.error("[LOG CRITICO] Dettaglio completo dell'errore:", error);
                
                if (loadingId) {
                    const loadingElement = document.getElementById(loadingId);
                    if (loadingElement) {
                        console.log("[LOG ANALISI] Rimozione messaggio di attesa...");
                        loadingElement.remove();
                    }
                }

                let messaggioUtente = error.message;
                
                if (error.name === "TypeError") {
                    console.warn("[LOG ANALISI] Errore di rete rilevato");
                    messaggioUtente = "Errore di rete: Controlla la tua connessione a Internet e riprova.";
                    // Log specifico per disconnessioni
                    console.warn("[LOG RETE] Possibile disconnessione o blocco CORS riscontrato.");
                }

                console.log("[LOG ANALISI] Mostra messaggio errore all'utente:", messaggioUtente);
                // Mostra il messaggio "amichevole" all'utente nella chat
                addMessageToChat(messaggioUtente, "bot-message");
                
            } finally {
                console.log("[LOG ANALISI] Pulizia finale - riabilita pulsante invio");
                sendBtn.disabled = false;
                document.getElementById("send-btn").disabled = false;
            }
        }
        

        // Funzione di supporto per creare i "baloon" della chat nel DOM
        function addMessageToChat(text, className, isHTML = false) {
            const chatBox = document.getElementById("chat-box");
            const messageDiv = document.createElement("div");
            
            messageDiv.classList.add("message", className);
            
            if (isHTML) {
                messageDiv.innerHTML = text;
            } else {
                messageDiv.textContent = text;
            }
            
            const messageId = "msg-" + Date.now() + "-" + Math.floor(Math.random() * 1000000);
            messageDiv.id = messageId;

            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            return messageId;
        }
    </script>
</body>
</html>
